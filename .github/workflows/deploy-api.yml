# API deployment pipeline
# Triggers only when API-related files change on main.
# Builds a Docker image using infrastructure/Dockerfile.api and pushes it to a
# container registry.  Deploy steps are commented out — uncomment and configure
# for your hosting platform (Railway, Fly.io, etc.).

name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "infrastructure/Dockerfile.api"
      - "pnpm-lock.yaml"

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build Docker image ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/Dockerfile.api
          push: false
          tags: proof-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

