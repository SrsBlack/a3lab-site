version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: proof-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: proof_db
      POSTGRES_USER: proof_user
      POSTGRES_PASSWORD: proof_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U proof_user -d proof_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: proof-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    container_name: proof-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://proof_user:proof_pass@postgres:5432/proof_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      NODE_ENV: development
      PORT: 3000

volumes:
  postgres_data:
    driver: local
