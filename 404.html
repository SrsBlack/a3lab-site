<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — A3 Lab</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@300,400,500,700&display=swap">
<link rel="stylesheet" href="./base.css">
<link rel="stylesheet" href="./style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0b0f'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-weight='800' font-size='18' fill='%2322d3ee'%3EA3%3C/text%3E%3C/svg%3E">
<style>
  .error-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: var(--space-6);
  }
  .error-code {
    font-family: var(--font-display);
    font-size: clamp(6rem, 15vw, 12rem);
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .error-message {
    font-size: var(--text-xl);
    color: var(--color-text-muted);
    margin: var(--space-4) 0 var(--space-6);
    max-width: 420px;
  }
  .error-cta {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: 0.85rem 1.8rem;
    border-radius: var(--radius-full);
    background: var(--color-primary);
    color: var(--color-bg);
    font-weight: 600;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .error-cta:hover { opacity: 0.85; }
</style>
</head>
<body>

<main class="error-page">
  <div class="error-code">404</div>
  <p class="error-message">This page doesn't exist but your automation workflows could. Let's get you back on track.</p>
  <a href="/" class="error-cta">Back to A3 Lab</a>
</main>

</body>
</html>
